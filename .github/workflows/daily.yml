name: Daily WC2026 Digest

on:
  schedule:
    - cron: '0 6 * * *'  # runs every day at 6:00 AM UTC (9:00 AM Israel time)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic google-cloud-storage

      - name: Fetch World Cup data
        run: python fetch_data.py

      - name: Generate HTML pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_pages.py

      - name: Upload to GCS
        env:
          GCS_CREDENTIALS: ${{ secrets.GCS_CREDENTIALS }}
        run: |
          echo "$GCS_CREDENTIALS" > /tmp/gcs_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs_key.json
          python - << 'PYEOF'
          from google.cloud import storage
          import os

          client = storage.Client()
          bucket = client.bucket("wc2026-digest")

          for lang in ["en", "he"]:
              source = f"output/{lang}/index.html"
              dest = f"{lang}/index.html"
              blob = bucket.blob(dest)
              blob.upload_from_filename(source, content_type="text/html; charset=utf-8")
              blob.cache_control = "no-cache, max-age=0"
              blob.patch()
              print(f"Uploaded {source} -> gs://wc2026-digest/{dest}")

          print("Done!")
          PYEOF