name: Daily WC2026 Digest

on:
  schedule:
    - cron: '0 6 * * *'  # runs every day at 6:00 AM UTC (9:00 AM Israel time)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch World Cup data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python -c "
          import requests, os
          key = os.environ.get('FOOTBALL_API_KEY', '')
          print('Key starts with:', key[:10])
          r = requests.get('https://api.football-data.org/v4/competitions/WC', headers={'X-Auth-Token': key})
          print('Status:', r.status_code)
          print('Response:', r.text[:500])
          "

      - name: Generate HTML pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_pages.py

      - name: Upload to GCS
        run: echo "GCS upload coming soon"
